<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Monitor outline (filled black = blacked out screen) -->
  <rect x="8" y="8" width="48" height="36" rx="3" ry="3" fill="#1A1A1A" stroke="#F9A825" stroke-width="4"/>
  <!-- Monitor stand -->
  <line x1="32" y1="44" x2="32" y2="52" stroke="#F9A825" stroke-width="4"/>
  <line x1="20" y1="52" x2="44" y2="52" stroke="#F9A825" stroke-width="4" stroke-linecap="round"/>
  <!-- Moon (crescent) inside monitor - yellow/active -->
  <path d="M36 18 A10 10 0 1 0 36 38 A7 7 0 1 1 36 18" fill="#F9A825"/>
</svg>
